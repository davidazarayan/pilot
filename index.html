<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивное Векторное Поле: Строгий Стиль</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #58c4dd; 
            --red: #fc6255;    
            --green: #83c167;  
            --yellow: #ffff00; 
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        canvas { display: block; }

        #ui-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #444; border-radius: 12px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            width: 320px; z-index: 10;
        }

        h1 { font-size: 1.2rem; margin-top: 0; color: var(--accent); letter-spacing: 1px; }
        p { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; line-height: 1.4; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; }
        select, input[type="range"] {
            width: 100%; background: #2a2a2a; color: white;
            border: 1px solid #555; padding: 6px; border-radius: 4px;
            font-family: inherit; margin-bottom: 5px;
        }
        input[type="range"] { accent-color: var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button {
            flex: 1; padding: 8px; font-family: inherit; font-weight: bold;
            border: none; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        #btn-shape { background-color: var(--green); color: #111; }
        #btn-shape:hover { background-color: #94d477; }
        #btn-clear { background-color: var(--red); color: white; }
        #btn-clear:hover { background-color: #ff7568; }

        .hint { margin-top: 15px; font-size: 0.8rem; color: var(--yellow); text-align: center; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Матан пилот</h1>
        <p>Приложенька для анимации действия вихревого поля на отдельные точки (клик) и на замкнутые функции ("бросить фигуру", фигура здесь круг)</p>
        
        <div class="control-group">
            <label>Уравнение поля (dx/dt, dy/dt):</label>
            <select id="equation">
                <option value="saddle">Седло: [x, -y]</option>
                <option value="vortex">Вихрь: [-y, x]</option>
                <option value="spiral">Спираль: [x - y, x + y]</option>
                <option value="waves">Волны: [sin(y), cos(x)]</option>
                <option value="complex">Нелинейное: [sin(x)*cos(y), -cos(x)*sin(y)]</option>
            </select>
        </div>

        <div class="control-group">
            <label>Скорость времени (dt): <span id="speed-val">0.01</span></label>
            <input type="range" id="speed" min="0.001" max="0.03" step="0.001" value="0.01">
        </div>

        <div class="btn-group">
            <button id="btn-shape">Бросить фигуру</button>
            <button id="btn-clear">Очистить</button>
        </div>

        <div class="hint">ЛКМ - рисовать линии потока.</div>
    </div>

    <canvas id="mathCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        const mathScale = 80; 
        
        let particles = [];
        let shapes = []; 
        let isDrawing = false;
        
        const eqSelect = document.getElementById('equation');
        const speedInput = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');

        const fields = {
            saddle: (x, y) => ({ dx: x, dy: -y }),
            vortex: (x, y) => ({ dx: -y, dy: x }),
            spiral: (x, y) => ({ dx: -y - 0.2*x, dy: x - 0.2*y }),
            waves:  (x, y) => ({ dx: Math.sin(y), dy: Math.cos(x) }),
            complex: (x, y) => ({ dx: Math.sin(x) * Math.cos(y), dy: -Math.cos(x) * Math.sin(y) })
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const toMath = (px, py) => ({ x: (px - width/2) / mathScale, y: -(py - height/2) / mathScale });
        const toScreen = (mx, my) => ({ x: mx * mathScale + width/2, y: -my * mathScale + height/2 });

        function getColor(magnitude) {
            const h = (240 - magnitude * 100); 
            return `hsl(${Math.max(0, h)}, 80%, 60%)`;
        }

        // --- Строгие координатные оси (без цифр) ---
        function drawAxes() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            const origin = toScreen(0, 0);

            // Ось X
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); ctx.stroke();
            // Ось Y
            ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); ctx.stroke();

            // Засечки (с шагом 1 математическая единица)
            const minX = Math.floor(-width / 2 / mathScale);
            const maxX = Math.ceil(width / 2 / mathScale);
            const minY = Math.floor(-height / 2 / mathScale);
            const maxY = Math.ceil(height / 2 / mathScale);

            ctx.lineWidth = 1;
            for (let i = minX; i <= maxX; i++) {
                if (i === 0) continue;
                let scr = toScreen(i, 0);
                ctx.beginPath(); ctx.moveTo(scr.x, origin.y - 4); ctx.lineTo(scr.x, origin.y + 4); ctx.stroke();
            }
            for (let j = minY; j <= maxY; j++) {
                if (j === 0) continue;
                let scr = toScreen(0, j);
                ctx.beginPath(); ctx.moveTo(origin.x - 4, scr.y); ctx.lineTo(origin.x + 4, scr.y); ctx.stroke();
            }
        }

        function drawVector(startX, startY, vx, vy, magnitude) {
            const screenStart = toScreen(startX, startY);
            const drawLength = Math.min(magnitude * 0.4, 0.4) * mathScale; 
            const angle = Math.atan2(-vy, vx);

            const endX = screenStart.x + Math.cos(angle) * drawLength;
            const endY = screenStart.y + Math.sin(angle) * drawLength;

            ctx.strokeStyle = `rgba(150, 150, 200, 0.15)`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(screenStart.x, screenStart.y); ctx.lineTo(endX, endY); ctx.stroke();

            const headlen = 4;
            ctx.fillStyle = ctx.strokeStyle;
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headlen * Math.cos(angle - Math.PI / 6), endY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(endX - headlen * Math.cos(angle + Math.PI / 6), endY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        function drawVectorField() {
            const step = 0.5;
            const startX = -Math.floor((width/2)/mathScale);
            const endX = Math.ceil((width/2)/mathScale);
            const startY = -Math.floor((height/2)/mathScale);
            const endY = Math.ceil((height/2)/mathScale);
            const getVector = fields[eqSelect.value];

            for (let x = startX; x <= endX; x += step) {
                for (let y = startY; y <= endY; y += step) {
                    const { dx, dy } = getVector(x, y);
                    const magnitude = Math.sqrt(dx*dx + dy*dy);
                    if (magnitude > 0.05) drawVector(x, y, dx, dy, magnitude);
                }
            }
        }

        // --- Класс непрерывной Фигуры (Строгий стиль) ---
        class FlowingShape {
            constructor(cx, cy, radius) {
                this.points = [];
                const numPoints = 150; 
                for(let i = 0; i < Math.PI * 2; i += (Math.PI * 2) / numPoints) {
                    this.points.push({ x: cx + Math.cos(i)*radius, y: cy + Math.sin(i)*radius });
                }
                const colors = ['#58c4dd', '#fc6255', '#83c167', '#ffff00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update(dt, getVector) {
                this.points.forEach(p => {
                    const { dx, dy } = getVector(p.x, p.y);
                    p.x += dx * dt;
                    p.y += dy * dt;
                });
            }

            draw() {
                if (this.points.length === 0) return;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5; 
                // Убрали свечение (shadowColor и shadowBlur), чтобы фигура была строгой

                ctx.beginPath();
                const start = toScreen(this.points[0].x, this.points[0].y);
                ctx.moveTo(start.x, start.y);
                
                for(let i = 1; i < this.points.length; i++) {
                    const scr = toScreen(this.points[i].x, this.points[i].y);
                    ctx.lineTo(scr.x, scr.y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.age = 0;
                this.lifespan = 150 + Math.random() * 100;
            }
            update(dt, getVector) {
                const { dx, dy } = getVector(this.x, this.y);
                this.x += dx * dt; this.y += dy * dt;
                this.age++;
                return Math.sqrt(dx*dx + dy*dy);
            }
            draw(magnitude) {
                const scr = toScreen(this.x, this.y);
                ctx.fillStyle = getColor(magnitude);
                ctx.beginPath(); ctx.arc(scr.x, scr.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; addParticles(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) addParticles(e); });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        function addParticles(e) {
            const mathPos = toMath(e.clientX, e.clientY);
            for(let i=0; i<3; i++) {
                particles.push(new Particle(mathPos.x + (Math.random()-0.5)*0.2, mathPos.y + (Math.random()-0.5)*0.2));
            }
        }

        document.getElementById('btn-shape').addEventListener('click', () => {
            const cx = (Math.random() - 0.5) * 4;
            const cy = (Math.random() - 0.5) * 4;
            shapes.push(new FlowingShape(cx, cy, 1.0));
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            particles = [];
            shapes = [];
        });

        speedInput.addEventListener('input', (e) => speedVal.innerText = e.target.value);
        eqSelect.addEventListener('change', () => { particles = []; shapes = []; });

        function animate() {
            ctx.fillStyle = 'rgba(30, 30, 30, 0.15)';
            ctx.fillRect(0, 0, width, height);

            drawAxes();
            drawVectorField();

            const dt = parseFloat(speedInput.value);
            const getVector = fields[eqSelect.value];

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                let mag = p.update(dt, getVector);
                p.draw(mag);
                if (p.age > p.lifespan || Math.abs(p.x) > width/mathScale || Math.abs(p.y) > height/mathScale) {
                    particles.splice(i, 1);
                }
            }

            for(let shape of shapes) {
                shape.update(dt, getVector);
                shape.draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
