<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матан пилот</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #58c4dd; 
            --red: #fc6255;    
            --green: #83c167;  
            --yellow: #ffff00; 
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        canvas { display: block; touch-action: none; /* Запрещаем скролл экрана при рисовании на телефоне */ }

        #ui-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #444; border-radius: 12px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            /* Адаптация под телефоны */
            width: 90%; 
            max-width: 340px; 
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 10;
        }

        /* Кастомный скроллбар для панели на телефонах */
        #ui-container::-webkit-scrollbar { width: 5px; }
        #ui-container::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }

        h1 { font-size: 1.4rem; margin-top: 0; color: var(--accent); letter-spacing: 1px; }
        p { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; line-height: 1.4; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #ccc; }
        
        select, input[type="range"] {
            width: 100%; background: #2a2a2a; color: white;
            border: 1px solid #555; padding: 6px; border-radius: 4px;
            font-family: inherit; margin-bottom: 5px; outline: none; box-sizing: border-box;
        }
        
        input[type="range"] { accent-color: var(--accent); }

        .custom-eq-container {
            background: #222; border: 1px solid #444; border-radius: 6px; padding: 10px; margin-top: 10px;
        }
        .eq-row { display: flex; align-items: center; margin-bottom: 8px; }
        .eq-row:last-child { margin-bottom: 0; }
        .eq-row span { color: var(--accent); font-weight: bold; width: 65px; font-size: 0.9rem; flex-shrink: 0;}
        .eq-input {
            flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #555;
            padding: 5px 8px; border-radius: 4px; font-family: inherit; outline: none; transition: 0.2s; min-width: 0;
        }
        .eq-input:focus { border-color: var(--accent); }
        .eq-error { border-color: var(--red) !important; background: rgba(252, 98, 85, 0.1); }
        .small-hint { font-size: 0.7rem; color: #888; margin-top: 5px; text-align: right; }

        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        button {
            padding: 8px; font-family: inherit; font-weight: bold;
            border: none; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        #btn-shape { background-color: var(--green); color: #111; flex: 1; }
        #btn-shape:hover { background-color: #94d477; }
        #btn-settings { background-color: #444; color: white; flex: 0.2; }
        #btn-settings:hover { background-color: #555; }
        #btn-clear { background-color: var(--red); color: white; flex: 1; }
        #btn-clear:hover { background-color: #ff7568; }

        .hint { margin-top: 15px; font-size: 0.8rem; color: var(--yellow); text-align: center; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Матан пилот</h1>
        <p>Приложение для анимации действия вихревого поля на отдельные точки (клик) и на замкнутые функции ("бросить фигуру", фигура круг)    </p>
        
        <div class="control-group">
            <label>Пресеты полей:</label>
            <select id="preset-select">
                <option value="vortex">Вихрь</option>
                <option value="pendulum">Маятник</option>
                <option value="spiral">Спираль</option>
                <option value="waves">Волны</option>
                <option value="complex">Нелинейное</option>
            </select>

            <div class="custom-eq-container">
                <div class="eq-row">
                    <span>dx/dt =</span>
                    <input type="text" id="eq-x" class="eq-input" value="-y">
                </div>
                <div class="eq-row">
                    <span>dy/dt =</span>
                    <input type="text" id="eq-y" class="eq-input" value="x">
                </div>
                <div class="small-hint">* Используйте + - * / ^ sin() cos()</div>
            </div>
        </div>

        <div class="control-group">
            <label>Скорость времени (dt): <span id="speed-val">0.01</span></label>
            <input type="range" id="speed" min="0.001" max="0.03" step="0.001" value="0.01">
        </div>

        <div class="btn-group">
            <button id="btn-shape">Бросить фигуру</button>
            <button id="btn-settings" title="Настройки кастомной фигуры">⚙️</button>
            <button id="btn-clear">Очистить</button>
        </div>

        <!-- Скрывающаяся панель для кастомной фигуры -->
        <div id="shape-panel" class="custom-eq-container" style="display: none;">
            <label style="font-size: 0.8rem; color: var(--green);">Параметрическая функция</label>
            <div class="eq-row">
                <span>x(t) =</span>
                <input type="text" id="shape-x" class="eq-input" value="cos(t)">
            </div>
            <div class="eq-row">
                <span>y(t) =</span>
                <input type="text" id="shape-y" class="eq-input" value="sin(t)">
            </div>
            <div class="small-hint">0<=t<=2pi</div>
        </div>

        <div class="hint">ЛКМ - рисовать линии потока.</div>
    </div>

    <canvas id="mathCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        const mathScale = 80; 
        
        let particles = [];
        let shapes = []; 
        let isDrawing = false;
        
        let currentVectorField = null;
        let currentShapeXFunc = null;
        let currentShapeYFunc = null;

        const presetSelect = document.getElementById('preset-select');
        const inputX = document.getElementById('eq-x');
        const inputY = document.getElementById('eq-y');
        const speedInput = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        
        const shapeInputX = document.getElementById('shape-x');
        const shapeInputY = document.getElementById('shape-y');
        const shapePanel = document.getElementById('shape-panel');
        const btnSettings = document.getElementById('btn-settings');

        const presets = {
            vortex: { x: '-y', y: 'x' },
            pendulum: { x: 'y', y: '-sin(x)' },
            spiral: { x: '-y - 0.2*x', y: 'x - 0.2*y' },
            waves:  { x: 'sin(y)', y: 'cos(x)' },
            complex: { x: 'sin(x)*cos(y)', y: '-cos(x)*sin(y)' }
        };

        function parseMathString(str) {
            let parsed = str.toLowerCase();
            const funcs = ['sin', 'cos', 'tan', 'exp', 'log', 'abs', 'sqrt'];
            funcs.forEach(f => {
                const regex = new RegExp('\\b' + f + '\\b', 'g');
                parsed = parsed.replace(regex, 'Math.' + f);
            });
            parsed = parsed.replace(/\^/g, '**');
            parsed = parsed.replace(/\bpi\b/g, 'Math.PI').replace(/\be\b/g, 'Math.E');
            return parsed;
        }

        function compileField() {
            try {
                const safeX = parseMathString(inputX.value);
                const safeY = parseMathString(inputY.value);
                const newFunc = new Function('x', 'y', `return { dx: ${safeX}, dy: ${safeY} };`);
                newFunc(1, 1); 

                currentVectorField = newFunc;
                inputX.classList.remove('eq-error');
                inputY.classList.remove('eq-error');
                particles = []; shapes = [];
            } catch (error) {
                inputX.classList.add('eq-error');
                inputY.classList.add('eq-error');
            }
        }

        function compileShape() {
            try {
                const sX = parseMathString(shapeInputX.value);
                const sY = parseMathString(shapeInputY.value);
                const funcX = new Function('t', `return ${sX};`);
                const funcY = new Function('t', `return ${sY};`);
                funcX(0); funcY(0);

                currentShapeXFunc = funcX;
                currentShapeYFunc = funcY;
                shapeInputX.classList.remove('eq-error');
                shapeInputY.classList.remove('eq-error');
            } catch (error) {
                shapeInputX.classList.add('eq-error');
                shapeInputY.classList.add('eq-error');
            }
        }

        inputX.addEventListener('input', compileField);
        inputY.addEventListener('input', compileField);
        shapeInputX.addEventListener('input', compileShape);
        shapeInputY.addEventListener('input', compileShape);

        presetSelect.addEventListener('change', () => {
            const pr = presets[presetSelect.value];
            inputX.value = pr.x;
            inputY.value = pr.y;
            compileField();
        });

        btnSettings.addEventListener('click', () => {
            shapePanel.style.display = shapePanel.style.display === 'none' ? 'block' : 'none';
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const toMath = (px, py) => ({ x: (px - width/2) / mathScale, y: -(py - height/2) / mathScale });
        const toScreen = (mx, my) => ({ x: mx * mathScale + width/2, y: -my * mathScale + height/2 });

        function getColor(magnitude) {
            const h = (240 - magnitude * 100); 
            return `hsl(${Math.max(0, h)}, 80%, 60%)`;
        }

        function drawAxes() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            const origin = toScreen(0, 0);

            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, origin.y); ctx.lineTo(width, origin.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(origin.x, 0); ctx.lineTo(origin.x, height); ctx.stroke();

            const minX = Math.floor(-width / 2 / mathScale);
            const maxX = Math.ceil(width / 2 / mathScale);
            const minY = Math.floor(-height / 2 / mathScale);
            const maxY = Math.ceil(height / 2 / mathScale);

            ctx.lineWidth = 1;
            for (let i = minX; i <= maxX; i++) {
                if (i === 0) continue;
                let scr = toScreen(i, 0);
                ctx.beginPath(); ctx.moveTo(scr.x, origin.y - 4); ctx.lineTo(scr.x, origin.y + 4); ctx.stroke();
            }
            for (let j = minY; j <= maxY; j++) {
                if (j === 0) continue;
                let scr = toScreen(0, j);
                ctx.beginPath(); ctx.moveTo(origin.x - 4, scr.y); ctx.lineTo(origin.x + 4, scr.y); ctx.stroke();
            }
        }

        function drawVector(startX, startY, vx, vy, magnitude) {
            const screenStart = toScreen(startX, startY);
            const drawLength = Math.min(magnitude * 0.4, 0.4) * mathScale; 
            const angle = Math.atan2(-vy, vx);

            const endX = screenStart.x + Math.cos(angle) * drawLength;
            const endY = screenStart.y + Math.sin(angle) * drawLength;

            ctx.strokeStyle = `rgba(150, 150, 200, 0.15)`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(screenStart.x, screenStart.y); ctx.lineTo(endX, endY); ctx.stroke();

            const headlen = 4;
            ctx.fillStyle = ctx.strokeStyle;
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - headlen * Math.cos(angle - Math.PI / 6), endY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(endX - headlen * Math.cos(angle + Math.PI / 6), endY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        function drawVectorField() {
            if (!currentVectorField) return;
            const step = 0.5;
            const startX = -Math.floor((width/2)/mathScale);
            const endX = Math.ceil((width/2)/mathScale);
            const startY = -Math.floor((height/2)/mathScale);
            const endY = Math.ceil((height/2)/mathScale);

            for (let x = startX; x <= endX; x += step) {
                for (let y = startY; y <= endY; y += step) {
                    const { dx, dy } = currentVectorField(x, y);
                    const magnitude = Math.sqrt(dx*dx + dy*dy);
                    if (magnitude > 0.05) drawVector(x, y, dx, dy, magnitude);
                }
            }
        }

        class FlowingShape {
            constructor(cx, cy) {
                this.points = [];
                const numPoints = 150; 
                for(let i = 0; i < Math.PI * 2; i += (Math.PI * 2) / numPoints) {
                    let px = cx;
                    let py = cy;
                    if(currentShapeXFunc && currentShapeYFunc) {
                        px += currentShapeXFunc(i);
                        py += currentShapeYFunc(i);
                    }
                    this.points.push({ x: px, y: py });
                }
                const colors = ['#58c4dd', '#fc6255', '#83c167', '#ffff00'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update(dt) {
                if(!currentVectorField) return;
                this.points.forEach(p => {
                    const { dx, dy } = currentVectorField(p.x, p.y);
                    p.x += dx * dt;
                    p.y += dy * dt;
                });
            }

            draw() {
                if (this.points.length === 0) return;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5; 

                ctx.beginPath();
                const start = toScreen(this.points[0].x, this.points[0].y);
                ctx.moveTo(start.x, start.y);
                for(let i = 1; i < this.points.length; i++) {
                    const scr = toScreen(this.points[i].x, this.points[i].y);
                    ctx.lineTo(scr.x, scr.y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y; this.age = 0;
                this.lifespan = 150 + Math.random() * 100;
            }
            update(dt) {
                if(!currentVectorField) return 0;
                const { dx, dy } = currentVectorField(this.x, this.y);
                this.x += dx * dt; this.y += dy * dt;
                this.age++;
                return Math.sqrt(dx*dx + dy*dy);
            }
            draw(magnitude) {
                const scr = toScreen(this.x, this.y);
                ctx.fillStyle = getColor(magnitude);
                ctx.beginPath(); ctx.arc(scr.x, scr.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function addParticles(x, y) {
            const mathPos = toMath(x, y);
            for(let i=0; i<3; i++) {
                particles.push(new Particle(mathPos.x + (Math.random()-0.5)*0.2, mathPos.y + (Math.random()-0.5)*0.2));
            }
        }

        // Мышь
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; addParticles(e.clientX, e.clientY); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) addParticles(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        // Сенсорные экраны (телефоны)
        canvas.addEventListener('touchstart', (e) => { 
            isDrawing = true; 
            addParticles(e.touches[0].clientX, e.touches[0].clientY); 
        });
        canvas.addEventListener('touchmove', (e) => { 
            if(isDrawing) addParticles(e.touches[0].clientX, e.touches[0].clientY); 
            e.preventDefault(); // чтобы экран не скроллился при рисовании
        }, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });

        document.getElementById('btn-shape').addEventListener('click', () => {
            const cx = (Math.random() - 0.5) * 4;
            const cy = (Math.random() - 0.5) * 4;
            shapes.push(new FlowingShape(cx, cy));
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            particles = []; shapes = [];
        });

        speedInput.addEventListener('input', (e) => speedVal.innerText = e.target.value);

        compileField();
        compileShape();

        function animate() {
            ctx.fillStyle = 'rgba(30, 30, 30, 0.15)';
            ctx.fillRect(0, 0, width, height);

            drawAxes();
            drawVectorField();

            const dt = parseFloat(speedInput.value);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                let mag = p.update(dt);
                p.draw(mag);
                if (p.age > p.lifespan || Math.abs(p.x) > width/mathScale || Math.abs(p.y) > height/mathScale) {
                    particles.splice(i, 1);
                }
            }

            for(let shape of shapes) {
                shape.update(dt);
                shape.draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
